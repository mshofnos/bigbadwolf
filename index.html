<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scooter vs Wolves</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; user-select: none; }
  h1 { color: #FFE066; font-size: 22px; margin-bottom: 10px; letter-spacing: 2px; }
  #ui { font-size: 13px; color: #aaa; display: flex; justify-content: space-between; width: 480px; padding: 8px 2px; }
  #ui b { color: #fff; }
  canvas { display: block; background: #87CEEB; border-radius: 10px; border: 2px solid #FFE066; cursor: pointer; outline: none; }
  #msg { text-align: center; font-size: 14px; color: #FFE066; margin-top: 10px; min-height: 20px; font-weight: bold; }
  #credit { margin-top: 10px; font-size: 11px; color: #555; }
</style>
</head>
<body>
<h1>⚾ SCOOTER VS WOLVES ⚾</h1>
<div id="ui"><span>Score: <b id="score">0</b></span><span>Lives: <b id="lives">3</b></span><span>Wave: <b id="wave">1</b></span></div>
<canvas id="gameCanvas" width="480" height="400" tabindex="0"></canvas>
<div id="msg">Click the game then press SPACE to start!</div>
<div id="credit">Arrow keys / WASD to move &bull; SPACE to throw &bull; Drag to move on mobile</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');
const msgEl = document.getElementById('msg');

canvas.addEventListener('click', () => canvas.focus());
canvas.addEventListener('mousedown', () => canvas.focus());
window.addEventListener('load', () => canvas.focus());
canvas.focus();

let state = 'idle', score = 0, lives = 3, wave = 1;
let player, balls, enemies, enemyBalls, particles, lastTime, enemyDir, enemyShootTimer, clouds;
const groundY = 370;
const keys = {};

function handleKeyDown(e) {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && (state === 'idle' || state === 'dead')) startGame();
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
}
function handleKeyUp(e) { keys[e.key] = false; }
window.addEventListener('keydown', handleKeyDown);
window.addEventListener('keyup', handleKeyUp);
canvas.addEventListener('keydown', handleKeyDown);
canvas.addEventListener('keyup', handleKeyUp);

function init() {
  player = { x: 240, y: 345, w: 40, h: 36, speed: 220, invincible: 0, legAnim: 0 };
  balls = []; enemies = []; enemyBalls = []; particles = [];
  enemyDir = 1; enemyShootTimer = 0;
  clouds = [
    { x: 60, y: 40, w: 90, h: 38 }, { x: 200, y: 25, w: 70, h: 30 },
    { x: 360, y: 50, w: 100, h: 36 }, { x: 430, y: 20, w: 60, h: 26 }
  ];
  spawnWave();
}

function spawnWave() {
  enemies = [];
  const cols = 7, rows = 2 + Math.min(wave - 1, 3);
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    enemies.push({ x: 44 + c * 58, y: 38 + r * 48, w: 36, h: 36, alive: true, type: r === 0 ? 2 : r < 2 ? 1 : 0, mouthOpen: 0, mouthDir: 1 });
  }
}

function drawCloud(c) {
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(c.x - c.w * 0.22, c.y + 4, c.w * 0.3, c.h * 0.38, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(c.x + c.w * 0.22, c.y + 6, c.w * 0.28, c.h * 0.35, 0, 0, Math.PI * 2); ctx.fill();
}

function drawGround() {
  ctx.fillStyle = '#5a8f3c'; ctx.fillRect(0, groundY, 480, 400 - groundY);
  ctx.fillStyle = '#6aaa48'; ctx.fillRect(0, groundY, 480, 6);
}

function drawScooterKid(x, y, inv, legAnim) {
  if (inv > 0 && Math.floor(inv * 10) % 2 === 0) return;
  const kickAngle = Math.sin(legAnim * 6) * 0.5;
  ctx.fillStyle = '#cc2200';
  ctx.beginPath(); ctx.roundRect(x - 20, y + 10, 40, 7, 3); ctx.fill();
  ctx.strokeStyle = '#cc2200'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x + 10, y + 10); ctx.lineTo(x + 12, y - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 5, y - 4); ctx.lineTo(x + 20, y - 4); ctx.stroke();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x - 14, y + 18, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(x - 14, y + 18, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x + 14, y + 18, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#888'; ctx.beginPath(); ctx.arc(x + 14, y + 18, 3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#3355cc'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - 2, y + 4); ctx.lineTo(x - 4, y + 10); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 2, y + 4);
  ctx.lineTo(x - 2 + Math.sin(kickAngle) * 14, y + 10 + Math.cos(kickAngle) * 8);
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(x - 2 + Math.sin(kickAngle) * 14, y + 10 + Math.cos(kickAngle) * 8 + 4, 6, 4, kickAngle, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff6644';
  ctx.beginPath(); ctx.roundRect(x - 9, y - 10, 18, 16, 4); ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(x, y - 12, 10, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#ffaa00'; ctx.fillRect(x - 10, y - 13, 20, 4);
  ctx.fillStyle = '#f5d060';
  ctx.beginPath(); ctx.arc(x - 6, y - 10, 4, Math.PI, 1.8 * Math.PI); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 6, y - 10, 4, Math.PI, 1.8 * Math.PI); ctx.fill();
  ctx.fillStyle = '#fce0b0';
  ctx.beginPath(); ctx.arc(x, y - 10, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x - 2, y - 11, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3, y - 11, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(x + 0.5, y - 9, 2.5, 0.1, Math.PI - 0.1); ctx.stroke();
  ctx.strokeStyle = '#fce0b0'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x + 6, y - 4); ctx.lineTo(x + 14, y - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - 8, y - 4); ctx.lineTo(x - 16, y - 12); ctx.stroke();
}

function drawWolf(e) {
  if (!e.alive) return;
  const x = e.x, y = e.y;
  const colors = [['#888', '#aaa'], ['#6b4c2a', '#9b7a52'], ['#333', '#555']];
  const [fur, light] = colors[e.type];
  ctx.fillStyle = fur;
  ctx.beginPath(); ctx.ellipse(x, y + 4, 14, 12, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y - 8, 13, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x - 10, y - 18); ctx.lineTo(x - 16, y - 28); ctx.lineTo(x - 4, y - 20); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + 10, y - 18); ctx.lineTo(x + 16, y - 28); ctx.lineTo(x + 4, y - 20); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#d88';
  ctx.beginPath(); ctx.moveTo(x - 10, y - 20); ctx.lineTo(x - 14, y - 26); ctx.lineTo(x - 5, y - 21); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + 10, y - 20); ctx.lineTo(x + 14, y - 26); ctx.lineTo(x + 5, y - 21); ctx.closePath(); ctx.fill();
  ctx.fillStyle = light;
  ctx.beginPath(); ctx.ellipse(x, y - 4, 8, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(x, y - 7, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  const mo = e.mouthOpen;
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x - 5, y - 2 + mo); ctx.quadraticCurveTo(x, y + 1 + mo * 1.5, x + 5, y - 2 + mo); ctx.stroke();
  if (mo > 1) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 4, y - 2 + mo, 3, mo + 1);
    ctx.fillRect(x + 1, y - 2 + mo, 3, mo + 1);
  }
  ctx.fillStyle = '#ff4400';
  ctx.beginPath(); ctx.arc(x - 5, y - 10, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5, y - 10, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x - 5, y - 10, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 5, y - 10, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x - 8, y - 14); ctx.lineTo(x - 2, y - 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + 8, y - 14); ctx.lineTo(x + 2, y - 12); ctx.stroke();
  if (e.type === 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BOSS', x, y + 20);
  }
}

function drawBaseball(b) {
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(b.x - 2, b.y, 3, Math.PI * 0.7, Math.PI * 1.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(b.x + 2, b.y, 3, -Math.PI * 0.3, Math.PI * 0.3); ctx.stroke();
}

function drawWindGust(b) {
  ctx.strokeStyle = 'rgba(100,180,255,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 1.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(b.x + 2, b.y + 2, 3, 0, Math.PI * 1.5); ctx.stroke();
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2, s = Math.random() * 100 + 40;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: Math.random() * 4 + 1, life: 1, color });
  }
}

function starBurst(x, y) {
  ['#FFD700', '#FF6B6B', '#6BCB77', '#4D9DE0'].forEach(c => spawnParticles(x + Math.random() * 20 - 10, y + Math.random() * 10 - 5, c));
}

function update(dt) {
  player.legAnim += dt;
  if (player.invincible > 0) player.invincible -= dt;
  if (keys['ArrowLeft'] || keys['a']) player.x = Math.max(22, player.x - player.speed * dt);
  if (keys['ArrowRight'] || keys['d']) player.x = Math.min(458, player.x + player.speed * dt);

  balls = balls.filter(b => { b.y -= 380 * dt; return b.y > 0; });
  enemyBalls = enemyBalls.filter(b => { b.y += 180 * dt; b.x += b.vx * dt; return b.y < 410; });

  let edgeHit = false;
  enemies.forEach(e => {
    if (!e.alive) return;
    e.x += enemyDir * (50 + wave * 10) * dt;
    if (e.x > 458 || e.x < 26) edgeHit = true;
    e.mouthOpen += e.mouthDir * dt * 4;
    if (e.mouthOpen > 3) e.mouthDir = -1;
    if (e.mouthOpen < 0) { e.mouthOpen = 0; e.mouthDir = 1; }
  });
  if (edgeHit) { enemyDir *= -1; enemies.forEach(e => { if (e.alive) e.y += 16; }); }

  enemyShootTimer -= dt;
  if (enemyShootTimer <= 0) {
    const alive = enemies.filter(e => e.alive);
    if (alive.length) {
      const e = alive[Math.floor(Math.random() * alive.length)];
      enemyBalls.push({ x: e.x, y: e.y + 18, vx: (Math.random() - 0.5) * 60 });
    }
    enemyShootTimer = Math.max(0.6, 2 - wave * 0.12);
  }

  balls.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive || b.dead) return;
      if (Math.abs(b.x - e.x) < e.w / 2 + 4 && Math.abs(b.y - e.y) < e.h / 2 + 4) {
        e.alive = false; b.dead = true;
        score += 10 * (e.type + 1); scoreEl.textContent = score;
        starBurst(e.x, e.y);
      }
    });
  });
  balls = balls.filter(b => !b.dead);

  if (player.invincible <= 0) {
    enemyBalls.forEach(b => {
      if (b.dead) return;
      if (Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 16) {
        b.dead = true; lives--; livesEl.textContent = lives;
        spawnParticles(player.x, player.y, '#ff4400');
        player.invincible = 2;
        if (lives <= 0) { state = 'dead'; msgEl.textContent = 'Oh no! The wolves won! Press SPACE to try again.'; }
      }
    });
    enemyBalls = enemyBalls.filter(b => !b.dead);
    enemies.forEach(e => {
      if (e.alive && e.y + 18 > player.y - 16 && Math.abs(e.x - player.x) < 24) {
        lives--; livesEl.textContent = lives;
        spawnParticles(player.x, player.y, '#ff4400');
        player.invincible = 2;
        if (lives <= 0) { state = 'dead'; msgEl.textContent = 'Oh no! The wolves won! Press SPACE to try again.'; }
      }
    });
  }

  particles = particles.filter(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 120 * dt; p.life -= dt * 1.4; return p.life > 0; });

  if (!enemies.some(e => e.alive)) {
    wave++; waveEl.textContent = wave; spawnWave();
    msgEl.textContent = 'Nice throw! Wave ' + wave + '!';
    setTimeout(() => { if (state === 'play') msgEl.textContent = ''; }, 1400);
  }
}

function draw() {
  ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, 480, 400);
  ctx.fillStyle = '#FFE066';
  ctx.beginPath(); ctx.arc(430, 45, 28, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(430 + Math.cos(a) * 32, 45 + Math.sin(a) * 32);
    ctx.lineTo(430 + Math.cos(a) * 42, 45 + Math.sin(a) * 42);
    ctx.stroke();
  }
  clouds.forEach(drawCloud);
  drawGround();
  enemies.forEach(drawWolf);
  balls.forEach(drawBaseball);
  enemyBalls.forEach(drawWindGust);
  drawScooterKid(player.x, player.y, player.invincible, player.legAnim);
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  if (state === 'idle') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, 480, 400);
    ctx.fillStyle = '#FFE066'; ctx.font = 'bold 26px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SCOOTER VS WOLVES', 240, 160);
    ctx.fillStyle = '#fff'; ctx.font = '15px monospace';
    ctx.fillText('Click here, then press SPACE to start', 240, 210);
    ctx.fillText('Arrow keys to move  |  SPACE to throw', 240, 240);
  }
}

let shootCooldown = 0;
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  shootCooldown -= dt;
  if (state === 'play') {
    if ((keys[' '] || keys['ArrowUp']) && shootCooldown <= 0) {
      balls.push({ x: player.x, y: player.y - 20 });
      shootCooldown = 0.25;
    }
    update(dt);
  }
  draw();
  requestAnimationFrame(loop);
}

let autoShoot = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); canvas.focus();
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  if (!autoShoot) autoShoot = setInterval(() => {
    if (state === 'play' && shootCooldown <= 0) { balls.push({ x: player.x, y: player.y - 20 }); shootCooldown = 0.25; }
  }, 260);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  player.x = Math.max(22, Math.min(458, (e.touches[0].clientX - rect.left) * (480 / rect.width)));
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); clearInterval(autoShoot); autoShoot = null; }, { passive: false });

canvas.addEventListener('click', () => {
  canvas.focus();
  if (state === 'idle' || state === 'dead') startGame();
});

function startGame() {
  score = 0; lives = 3; wave = 1;
  scoreEl.textContent = 0; livesEl.textContent = 3; waveEl.textContent = 1;
  state = 'play'; msgEl.textContent = '';
  init();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
